<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body>
    <div id="app">
        <span>{{emoji}}</span>
        <h1>{{title}}</h1>
        <p>{{desc}}</p>
        <a href="https://www.scrimba.com" target="_blank">{{linkText}}</a>
    </div>
    
    <script>
        const { createApp, ref } = Vue
        createApp({
            setup(){
                const emoji = ref("❤️")
                const title = ref("Assalamualaikum!")
                const desc = ref("Ola! Soy, Dora!")
                const linkText = ref("Pergi Google")
                return { emoji, title, desc, linkText }
            }
        }).mount('#app')
    </script>
</body>
</html>
