<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body>
    <div id="app">
        <h1>Hello, {{name}}!</h1>
    </div>
    <script>
        const { createApp, ref } = Vue
        createApp({
            setup(){
                const name = ref("Aliya")
                return { name }
            }
        }).mount('#app')
    </script>
</body>
</html>
